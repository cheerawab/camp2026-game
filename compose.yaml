services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: camp2026-game-frontend:production
    restart: unless-stopped
    environment:
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:${FRONTEND_PORT:-3000}}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: camp2026-game-api:production
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      SERVICE_NAME: ${SERVICE_NAME:-camp2026-game-api}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: :8080
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-10s}
      HTTP_READ_HEADER_TIMEOUT: ${HTTP_READ_HEADER_TIMEOUT:-5s}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-15s}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      MONGODB_URI: mongodb://${MONGO_USERNAME:?set MONGO_USERNAME}:${MONGO_PASSWORD:?set MONGO_PASSWORD}@mongodb:27017/${MONGODB_DATABASE:-camp2026}?authSource=admin
      MONGODB_DATABASE: ${MONGODB_DATABASE:-camp2026}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?set MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?set MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-camp2026}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://${MONGO_USERNAME:?set MONGO_USERNAME}:${MONGO_PASSWORD:?set MONGO_PASSWORD}@localhost:27017/admin",
          "--eval",
          "db.adminCommand({ ping: 1 }).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb-data:
