services:
  nginx:
    build:
      context: ./frontend
    image: camp2026-frontend:production
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      - backend
    networks:
      - moniting
      - dokploy-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    command:
      - -nginx.scrape-uri=http://nginx:80/nginx_status
    restart: unless-stopped
    depends_on:
      - nginx
    ports:
      - "9113"
    networks:
      - moniting

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        QUIZ_QUESTIONS_CSV_URL: ${QUIZ_QUESTIONS_CSV_URL:-}
    image: camp2026-game-api:production
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      SERVICE_NAME: ${SERVICE_NAME:-camp2026-game-api}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: :8080
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-10s}
      HTTP_READ_HEADER_TIMEOUT: ${HTTP_READ_HEADER_TIMEOUT:-5s}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-15s}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-camp2026}:${MONGO_PASSWORD:-camp2026}@mongodb:27017/${MONGODB_DATABASE:-camp2026}?authSource=admin&replicaSet=${MONGO_REPLICA_SET_NAME:-rs0}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-camp2026}
    expose:
      - "8080"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - moniting
      - dokploy-network

  tgbot:
    build:
      context: .
      dockerfile: tgbot/Dockerfile
    image: camp2026-tgbot:production
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      APP_LOGIN_BASE_URL: ${APP_LOGIN_BASE_URL}
      TG_GROUP_TEAM_MAP: ${TG_GROUP_TEAM_MAP}
      INITIAL_SITONE_IDS: ${INITIAL_SITONE_IDS:-stone_explorer_base,stone_inspiration_base,stone_resonance_base,stone_engineering_base,stone_entertainment_base}
      TG_POLL_TIMEOUT: ${TG_POLL_TIMEOUT:-50s}
      TG_LOGIN_REQUEST_TTL: ${TG_LOGIN_REQUEST_TTL:-10m}
      TG_HTTP_CLIENT_TIMEOUT: ${TG_HTTP_CLIENT_TIMEOUT:-60s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-camp2026}:${MONGO_PASSWORD:-camp2026}@mongodb:27017/${MONGODB_DATABASE:-camp2026}?authSource=admin&replicaSet=${MONGO_REPLICA_SET_NAME:-rs0}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-camp2026}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - moniting

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    entrypoint:
      - bash
      - -c
      - |
        set -e
        if [ -z "$${MONGO_REPLICA_SET_KEY}" ]; then
          echo "MONGO_REPLICA_SET_KEY is required" >&2
          exit 1
        fi
        keyfile=/data/configdb/keyfile
        mkdir -p /data/configdb
        printf '%s\n' "$${MONGO_REPLICA_SET_KEY}" > "$$keyfile"
        chmod 400 "$$keyfile"
        chown mongodb:mongodb "$$keyfile"
        exec docker-entrypoint.sh mongod --replSet "$${MONGO_REPLICA_SET_NAME:-rs0}" --bind_ip_all --keyFile "$$keyfile"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-camp2026}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-camp2026}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-camp2026}
      MONGO_REPLICA_SET_NAME: ${MONGO_REPLICA_SET_NAME:-rs0}
      MONGO_REPLICA_SET_HOST: mongodb:27017
      MONGO_REPLICA_SET_KEY: ${MONGO_REPLICA_SET_KEY:-camp2026ReplicaSetKeyChangeMe1234567890}
    ports:
      - "${MONGODB_PORT:-27017}"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host localhost --port 27017 -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'const name = process.env.MONGO_REPLICA_SET_NAME || \"rs0\"; const host = process.env.MONGO_REPLICA_SET_HOST || \"mongodb:27017\"; try { const status = rs.status(); if (status.myState !== 1) quit(1); } catch (err) { if (err.code === 94 || err.codeName === \"NotYetInitialized\" || /no replset config has been received|not yet initialized/i.test(err.message)) { rs.initiate({_id: name, members: [{_id: 0, host}]}); quit(1); } throw err; } db.adminCommand({ ping: 1 }).ok'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - moniting

  mongodb-exporter:
    image: percona/mongodb_exporter:0.51.0
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://${MONGO_USERNAME:-camp2026}:${MONGO_PASSWORD:-camp2026}@mongodb:27017/admin?authSource=admin&replicaSet=${MONGO_REPLICA_SET_NAME:-rs0}
    ports:
      - "9216"
    command:
      - "--compatible-mode"
    networks:
      - moniting

networks:
  moniting:
    external: true
  dokploy-network:
    external: true

volumes:
  mongodb-data: {}
