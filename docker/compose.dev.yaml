services:
  mongodb:
    image: mongo:7.0
    container_name: camp2026-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: camp2026
      MONGO_INITDB_ROOT_PASSWORD: camp2026
      MONGO_INITDB_DATABASE: camp2026
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://camp2026:camp2026@localhost:27017/admin",
          "--eval",
          "db.adminCommand({ ping: 1 }).ok",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongodb-data:
