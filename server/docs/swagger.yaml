basePath: /api
definitions:
  apimodel.ActivityClaimResponse:
    properties:
      activity:
        $ref: '#/definitions/apimodel.ActivitySummary'
      reward:
        $ref: '#/definitions/apimodel.Reward'
    type: object
  apimodel.ActivityDetailResponse:
    properties:
      activity:
        $ref: '#/definitions/apimodel.ActivitySummary'
    type: object
  apimodel.ActivityListResponse:
    properties:
      activities:
        items:
          $ref: '#/definitions/apimodel.ActivitySummary'
        type: array
    type: object
  apimodel.ActivitySummary:
    properties:
      activityId:
        example: booth-linux-101
        type: string
      description:
        example: Complete the booth challenge to receive a sitone.
        type: string
      name:
        example: Linux 101 Booth
        type: string
      reward:
        $ref: '#/definitions/apimodel.Reward'
      status:
        example: claimable
        type: string
    type: object
  apimodel.AuthLoginRequest:
    properties:
      token:
        example: eyJjYW1wMjAyNiI6InBsYXllci0wMSJ9
        maxLength: 512
        minLength: 16
        type: string
    required:
    - token
    type: object
  apimodel.AuthLoginResponse:
    properties:
      player:
        $ref: '#/definitions/apimodel.AuthPlayerSummary'
    type: object
  apimodel.AuthPlayerSummary:
    properties:
      avatarUrl:
        example: https://example.test/avatar/alice.png
        type: string
      nickname:
        example: Alice
        type: string
      openPower:
        example: 1280
        type: integer
      playerId:
        example: 7H9K2Q
        type: string
      team:
        $ref: '#/definitions/apimodel.AuthTeamSummary'
    type: object
  apimodel.AuthTeamSummary:
    properties:
      name:
        example: Blue Team
        type: string
      teamId:
        example: 8M4RXP
        type: string
    type: object
  apimodel.CatalogItemListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/apimodel.CatalogItemSummary'
        type: array
    type: object
  apimodel.CatalogItemSummary:
    properties:
      acquisitionHint:
        example: Buy from the shop with open power.
        type: string
      definitionId:
        example: item-camp-sticker
        type: string
      itemType:
        example: craft_material
        type: string
      name:
        example: Camp Sticker
        type: string
    type: object
  apimodel.CatalogSitoneListResponse:
    properties:
      sitones:
        items:
          $ref: '#/definitions/apimodel.CatalogSitoneSummary'
        type: array
    type: object
  apimodel.CatalogSitoneSummary:
    properties:
      acquisitionHint:
        example: Complete engineering missions.
        type: string
      definitionId:
        example: sitone-engineering
        type: string
      name:
        example: Engineering Sitone
        type: string
      rarity:
        example: rare
        type: string
      type:
        example: engineering
        type: string
    type: object
  apimodel.CraftRequest:
    properties:
      itemIds:
        example:
        - pit_01HR9Z7E2Z2VJ2QZ4P4Z
        items:
          type: string
        minItems: 1
        type: array
      recipeId:
        example: recipe_engineering_skin
        type: string
      sitoneIds:
        example:
        - S9K2QA
        items:
          type: string
        minItems: 1
        type: array
    required:
    - itemIds
    - recipeId
    - sitoneIds
    type: object
  apimodel.CraftResponse:
    properties:
      consumedItemIds:
        example:
        - pit_01HR9Z7E2Z2VJ2QZ4P4Z
        items:
          type: string
        type: array
      consumedSitoneIds:
        example:
        - S9K2QA
        items:
          type: string
        type: array
      createdItem:
        $ref: '#/definitions/apimodel.ItemSummary'
      createdSitone:
        $ref: '#/definitions/apimodel.SitoneSummary'
    type: object
  apimodel.ItemGrant:
    properties:
      definitionId:
        example: item-camp-sticker
        type: string
      quantity:
        example: 2
        type: integer
    type: object
  apimodel.ItemListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/apimodel.ItemSummary'
        type: array
    type: object
  apimodel.ItemSummary:
    properties:
      definitionId:
        example: item-camp-sticker
        type: string
      id:
        example: pit_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
      name:
        example: Camp Sticker
        type: string
      quantity:
        example: 3
        type: integer
    type: object
  apimodel.MatchAnswerSubmitRequest:
    properties:
      choiceId:
        example: A
        type: string
      clientAnsweredAt:
        example: "2026-07-24T10:31:00+08:00"
        type: string
      questionId:
        example: question_001
        type: string
    required:
    - choiceId
    - questionId
    type: object
  apimodel.MatchAnswerSubmitResponse:
    properties:
      battle:
        $ref: '#/definitions/apimodel.MatchBattleState'
      correct:
        example: true
        type: boolean
      correctChoiceId:
        example: A
        type: string
      explanation:
        example: The MIT License is a permissive open source license.
        type: string
      nextQuestion:
        $ref: '#/definitions/apimodel.MatchQuestion'
      openPowerGained:
        example: 80
        type: integer
    type: object
  apimodel.MatchBattleState:
    properties:
      opponentHp:
        example: 65
        type: integer
      playerHp:
        example: 90
        type: integer
      round:
        example: 2
        type: integer
    type: object
  apimodel.MatchChoice:
    properties:
      choiceId:
        example: A
        type: string
      text:
        example: MIT License
        type: string
    type: object
  apimodel.MatchCreateRequest:
    properties:
      opponentQRCodeToken:
        example: qr_opponent_token
        maxLength: 200
        minLength: 8
        type: string
      sitoneIds:
        example:
        - S9K2QA
        items:
          type: string
        maxItems: 5
        minItems: 1
        type: array
    required:
    - opponentQRCodeToken
    - sitoneIds
    type: object
  apimodel.MatchFinishResponse:
    properties:
      matchId:
        example: M8RXP2
        type: string
      openPower:
        example: 1400
        type: integer
      openPowerGained:
        example: 120
        type: integer
      result:
        example: win
        type: string
    type: object
  apimodel.MatchListResponse:
    properties:
      matches:
        items:
          $ref: '#/definitions/apimodel.MatchSummary'
        type: array
    type: object
  apimodel.MatchParticipant:
    properties:
      displayName:
        example: Alice
        type: string
      hp:
        example: 100
        type: integer
      openPower:
        example: 1280
        type: integer
      playerId:
        example: player_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
    type: object
  apimodel.MatchQuestion:
    properties:
      choices:
        items:
          $ref: '#/definitions/apimodel.MatchChoice'
        type: array
      prompt:
        example: Which license is commonly used for open source projects?
        type: string
      questionId:
        example: question_001
        type: string
      timeLimitSeconds:
        example: 30
        type: integer
    type: object
  apimodel.MatchResponse:
    properties:
      matchId:
        example: match_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
      mode:
        example: qr_duel
        type: string
      opponent:
        $ref: '#/definitions/apimodel.MatchParticipant'
      player:
        $ref: '#/definitions/apimodel.MatchParticipant'
      question:
        $ref: '#/definitions/apimodel.MatchQuestion'
      status:
        example: answering
        type: string
    type: object
  apimodel.MatchSummary:
    properties:
      completedAt:
        example: "2026-07-24T10:35:00+08:00"
        type: string
      matchId:
        example: match_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
      mode:
        example: qr_duel
        type: string
      openPowerGained:
        example: 80
        type: integer
      opponentName:
        example: Bob
        type: string
      opponentScore:
        example: 280
        type: integer
      playerScore:
        example: 320
        type: integer
      status:
        example: completed
        type: string
    type: object
  apimodel.MeResponse:
    properties:
      player:
        $ref: '#/definitions/apimodel.AuthPlayerSummary'
    type: object
  apimodel.OpenPowerBalanceResponse:
    properties:
      balance:
        example: 1280
        type: integer
    type: object
  apimodel.OpenPowerRecordListResponse:
    properties:
      records:
        items:
          $ref: '#/definitions/apimodel.OpenPowerRecordSummary'
        type: array
    type: object
  apimodel.OpenPowerRecordSummary:
    properties:
      amount:
        example: 120
        type: integer
      createdAt:
        example: "2026-07-24T10:35:00+08:00"
        type: string
      reason:
        example: match_win
        type: string
      recordId:
        example: N6T3ZA9K
        type: string
      source:
        example: match
        type: string
    type: object
  apimodel.QRCodeResponse:
    properties:
      imageUrl:
        example: https://example.test/qrcode/player_qr_token.png
        type: string
      purposes:
        example:
        - identity
        - match_pairing
        items:
          type: string
        type: array
      token:
        example: player_qr_token
        type: string
    type: object
  apimodel.QRCodeScanRequest:
    properties:
      context:
        enum:
        - match_pairing
        example: match_pairing
        type: string
      token:
        example: player_qr_token
        maxLength: 200
        minLength: 8
        type: string
    required:
    - context
    - token
    type: object
  apimodel.QRCodeScanResponse:
    properties:
      availableActions:
        example:
        - create_match_pairing
        items:
          type: string
        type: array
      displayName:
        example: Alice
        type: string
      kind:
        example: player
        type: string
      playerId:
        example: player_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
    type: object
  apimodel.RecipeListResponse:
    properties:
      recipes:
        items:
          $ref: '#/definitions/apimodel.RecipeSummary'
        type: array
    type: object
  apimodel.RecipeSummary:
    properties:
      acquisitionHint:
        example: Complete engineering missions.
        type: string
      craftable:
        example: true
        type: boolean
      name:
        example: Engineering Skin
        type: string
      outputDefinitionId:
        example: sitone-engineering-skin
        type: string
      recipeId:
        example: recipe_engineering_skin
        type: string
      requiredItemId:
        example: item-camp-sticker
        type: string
      requiredItemQuantity:
        example: 1
        type: integer
      requiredSitoneDefinitionId:
        example: sitone-engineering
        type: string
      requiredSitoneType:
        example: engineering
        type: string
      unlocked:
        example: true
        type: boolean
    type: object
  apimodel.Reward:
    properties:
      items:
        items:
          $ref: '#/definitions/apimodel.ItemGrant'
        type: array
      openPower:
        example: 120
        type: integer
      sitones:
        items:
          $ref: '#/definitions/apimodel.SitoneGrant'
        type: array
    type: object
  apimodel.ShopItemDetailResponse:
    properties:
      item:
        $ref: '#/definitions/apimodel.ShopItemSummary'
    type: object
  apimodel.ShopItemListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/apimodel.ShopItemSummary'
        type: array
    type: object
  apimodel.ShopItemSummary:
    properties:
      description:
        example: Used to craft advanced sitones.
        type: string
      itemId:
        example: item-upgrade-stone
        type: string
      itemType:
        example: craft_material
        type: string
      name:
        example: Upgrade Stone
        type: string
      priceOpenPower:
        example: 300
        type: integer
    type: object
  apimodel.ShopPurchaseRequest:
    properties:
      itemId:
        example: item-upgrade-stone
        type: string
      quantity:
        example: 1
        maximum: 99
        minimum: 1
        type: integer
    required:
    - itemId
    - quantity
    type: object
  apimodel.ShopPurchaseResponse:
    properties:
      item:
        $ref: '#/definitions/apimodel.ItemSummary'
      openPower:
        example: 980
        type: integer
      openPowerSpent:
        example: 300
        type: integer
      purchaseId:
        example: P9K2QA
        type: string
    type: object
  apimodel.SitoneGrant:
    properties:
      definitionId:
        example: sitone-engineering
        type: string
      quantity:
        example: 1
        type: integer
    type: object
  apimodel.SitoneListResponse:
    properties:
      sitones:
        items:
          $ref: '#/definitions/apimodel.SitoneSummary'
        type: array
    type: object
  apimodel.SitoneSummary:
    properties:
      definitionId:
        example: sitone-engineering
        type: string
      id:
        example: sitone_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
      name:
        example: Engineering Sitone
        type: string
      rarity:
        example: rare
        type: string
      style:
        example: default
        type: string
      type:
        example: engineering
        type: string
    type: object
  apimodel.StaffActivityVerificationRequest:
    properties:
      activityCode:
        example: booth-linux-101
        maxLength: 80
        type: string
      missionId:
        example: mission_activity_linux_101
        type: string
      targetQrCodeToken:
        example: player_qr_token
        maxLength: 200
        minLength: 8
        type: string
    required:
    - activityCode
    - targetQrCodeToken
    type: object
  apimodel.StaffActivityVerificationResponse:
    properties:
      missionId:
        example: mission_activity_linux_101
        type: string
      playerId:
        example: player_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
      reward:
        $ref: '#/definitions/apimodel.Reward'
      verificationId:
        example: verify_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
    type: object
  apimodel.StaffGrantRewardRequest:
    properties:
      itemDefinitionIds:
        example:
        - item-camp-sticker
        items:
          type: string
        type: array
      openPower:
        example: 100
        maximum: 10000
        minimum: 0
        type: integer
      reason:
        example: camp_activity_reward
        maxLength: 120
        type: string
      sitoneDefinitionIds:
        example:
        - sitone-engineering
        items:
          type: string
        type: array
      targetQrCodeToken:
        example: player_qr_token
        maxLength: 200
        minLength: 8
        type: string
    required:
    - itemDefinitionIds
    - reason
    - sitoneDefinitionIds
    - targetQrCodeToken
    type: object
  apimodel.StaffGrantRewardResponse:
    properties:
      grantId:
        example: grant_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
      playerId:
        example: player_01HR9Z7E2Z2VJ2QZ4P4Z
        type: string
      reward:
        $ref: '#/definitions/apimodel.Reward'
    type: object
  apimodel.UserStatePlayer:
    properties:
      avatarUrl:
        example: https://example.test/avatar/alice.png
        type: string
      nickname:
        example: Alice
        type: string
      playerId:
        example: 7H9K2Q
        type: string
      team:
        $ref: '#/definitions/apimodel.AuthTeamSummary'
    type: object
  apimodel.UserStateResponse:
    properties:
      activeMatchCount:
        example: 0
        type: integer
      itemCount:
        example: 3
        type: integer
      openPower:
        example: 1280
        type: integer
      player:
        $ref: '#/definitions/apimodel.UserStatePlayer'
      sitoneCount:
        example: 5
        type: integer
    type: object
  httpx.ErrorDetail:
    properties:
      location:
        type: string
      message:
        type: string
    type: object
  httpx.ProblemDetails:
    properties:
      detail:
        type: string
      errors:
        items:
          $ref: '#/definitions/httpx.ErrorDetail'
        type: array
      instance:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  system.StatusResponse:
    properties:
      checks:
        additionalProperties:
          type: string
        example:
          database: ok
        type: object
      status:
        example: ok
        type: string
    type: object
info:
  contact: {}
  description: Backend API for the SITCON Camp 2026 game.
  title: Camp 2026 Game API
  version: 0.1.0
paths:
  /activities:
    get:
      description: Lists activities that can grant sitones to the current player.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apimodel.ActivityListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: List activities
      tags:
      - Activities
  /activities/{activityID}:
    get:
      description: Returns one activity and its sitone reward information.
      parameters:
      - description: Activity ID
        in: path
        name: activityID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apimodel.ActivityDetailResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: Get activity
      tags:
      - Activities
  /activities/{activityID}/claims:
    post:
      description: Claims a sitone reward from an activity when the player is eligible.
      parameters:
      - description: Activity ID
        in: path
        name: activityID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/apimodel.ActivityClaimResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: Claim activity reward
      tags:
      - Activities
  /auth/login:
    post:
      consumes:
      - application/json
      description: User-facing endpoint. Validates the stable auth token from the
        issued game URL and writes it to the camp2026_auth cookie.
      parameters:
      - description: Auth login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apimodel.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: camp2026_auth=<auth-token>; Path=/; HttpOnly; Secure; SameSite=Lax
              type: string
          schema:
            $ref: '#/definitions/apimodel.AuthLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      summary: User login with auth token
      tags:
      - User Authentication
  /auth/logout:
    post:
      description: Clears the camp2026_auth cookie for the current browser session.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              description: camp2026_auth=; Path=/; HttpOnly; Secure; SameSite=Lax;
                Max-Age=0
              type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: User logout
      tags:
      - User Authentication
  /catalog/crafting-recipes:
    get:
      description: Lists public crafting recipes and acquisition hints.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apimodel.RecipeListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: List recipe catalog
      tags:
      - Catalog
  /catalog/items:
    get:
      description: Lists all collectible item definitions and acquisition hints.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apimodel.CatalogItemListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: List item catalog
      tags:
      - Catalog
  /catalog/sitones:
    get:
      description: Lists all collectible sitone definitions and acquisition hints.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apimodel.CatalogSitoneListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: List sitone catalog
      tags:
      - Catalog
  /crafting:
    post:
      consumes:
      - application/json
      description: Uses sitones and items to craft a new sitone.
      parameters:
      - description: Craft request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apimodel.CraftRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/apimodel.CraftResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: Craft sitone
      tags:
      - Crafting
  /crafting/recipes:
    get:
      description: Lists crafting recipes visible to the current player, including
        whether each recipe is currently craftable.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apimodel.RecipeListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
