info:
  contact: {}
  description: Backend API for the SITCON Camp 2026 game.
  title: Camp 2026 Game API
  version: 0.1.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: User-facing endpoint. Validates the stable auth token from the
        issued game URL and writes it to the camp2026_auth cookie.
      parameters:
      - description: Auth login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apimodel.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: camp2026_auth=<auth-token>; Path=/; HttpOnly; Secure; SameSite=Lax
              type: string
          schema:
            $ref: '#/definitions/apimodel.AuthLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      summary: User login with auth token
      tags:
      - User Authentication
  /auth/logout:
    post:
      description: Clears the camp2026_auth cookie for the current browser session.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              description: camp2026_auth=; Path=/; HttpOnly; Secure; SameSite=Lax;
                Max-Age=0
              type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: User logout
      tags:
      - User Authentication
  /bingo/boards:
    get:
      description: Lists the current player's bingo boards, cells, mission progress,
        and line reward state.
      parameters:
      - description: Board category
        enum:
        - daily
        - persistent
        - event
        in: query
