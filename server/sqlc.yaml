version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migrations"
    queries:
      - "db/query"
    gen:
      go:
        package: "sqlc"
        out: "internal/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_pointers_for_null_types: true
