basePath: /api
definitions:
  apimodel.AuthLoginRequest:
    properties:
      token:
        example: eyJjYW1wMjAyNiI6InBsYXllci0wMSJ9
        maxLength: 512
        minLength: 16
        type: string
    required:
    - token
    type: object
  apimodel.AuthLoginResponse:
    properties:
      player:
        $ref: '#/definitions/apimodel.AuthPlayerSummary'
    type: object
  apimodel.AuthPlayerSummary:
    properties:
      avatarUrl:
        example: https://example.test/avatar/alice.png
        type: string
      nickname:
        example: Alice
        type: string
      openPower:
        example: 1280
        type: integer
      playerId:
        example: 7H9K2Q
        type: string
      team:
        $ref: '#/definitions/apimodel.AuthTeamSummary'
    type: object
  apimodel.AuthTeamSummary:
    properties:
      name:
        example: Blue Team
        type: string
      teamId:
        example: 8M4RXP
        type: string
    type: object
  catalog.SitoneListResponse:
    properties:
      sitones:
        items:
          $ref: '#/definitions/catalog.SitoneResponse'
        type: array
    type: object
  catalog.SitoneResponse:
    properties:
      description:
        example: 修 bug、分享解法、完成技術任務。
        type: string
      id:
        example: sitone-engineering
        type: string
      name:
        example: 工程型小石
        type: string
      rarity:
        example: base
        type: string
      style:
        example: default
        type: string
      type:
        example: engineering
        type: string
    type: object
  httpx.ErrorDetail:
    properties:
      location:
        type: string
      message:
        type: string
    type: object
  httpx.ProblemDetails:
    properties:
      detail:
        type: string
      errors:
        items:
          $ref: '#/definitions/httpx.ErrorDetail'
        type: array
      instance:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  system.StatusResponse:
    properties:
      checks:
        additionalProperties:
          type: string
        example:
          database: ok
        type: object
      status:
        example: ok
        type: string
    type: object
info:
  contact: {}
  description: Backend API for the SITCON Camp 2026 game.
  title: Camp 2026 Game API
  version: 0.1.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: User-facing endpoint. Validates the stable auth token from the
        issued game URL and writes it to the camp2026_auth cookie.
      parameters:
      - description: Auth login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apimodel.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: camp2026_auth=<auth-token>; Path=/; HttpOnly; Secure; SameSite=Lax
              type: string
          schema:
            $ref: '#/definitions/apimodel.AuthLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      summary: User login with auth token
      tags:
      - User Authentication
  /auth/logout:
    post:
      description: Clears the camp2026_auth cookie for the current browser session.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              description: camp2026_auth=; Path=/; HttpOnly; Secure; SameSite=Lax;
                Max-Age=0
              type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      security:
      - AuthCookieAuth: []
      summary: User logout
      tags:
      - User Authentication
  /catalog/sitones:
    get:
      description: Lists all collectible sitone definitions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/catalog.SitoneListResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      summary: List sitone catalog
      tags:
      - catalog
  /healthz:
    get:
      description: Confirms the HTTP process is alive and the database is reachable.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/system.StatusResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpx.ProblemDetails'
      summary: Health check
      tags:
      - system
schemes:
- http
- https
securityDefinitions:
  AuthCookieAuth:
    description: 'User auth cookie. Send as `Cookie: camp2026_auth=<base64url-auth-token>`.'
    in: header
    name: Cookie
    type: apiKey
swagger: "2.0"
